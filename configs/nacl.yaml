system:
  name: nacl_association
  event_type: association

  # Synthetic NaCl-like distance dynamics.
  num_trajectories: 1000
  trajectory_length: 400
  dt: 0.02
  noise_std: 0.08
  drift_strength: 0.35

  # Distance units are arbitrary for this synthetic benchmark,
  # but we will treat them like nm conceptually.
  start_distance_mean: 1.25
  start_distance_std: 0.08
  min_distance: 0.20
  max_distance: 1.60

  # Association event: Na-Cl distance falls below threshold.
  association_distance: 0.35

  seed: 42

dataset:
  window_size: 25
  horizon: 50
  stride: 5

features:
  use_distance: true
  use_delta_distance: true
  use_radial_velocity: true
  use_inverse_distance: true
  use_moving_average: true

output:
  dir: outputs/nacl
  save_npz: true

training:
  batch_size: 128
  epochs: 20
  learning_rate: 0.001
  hidden_dim: 128
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

binning:
  num_score_bins: 8