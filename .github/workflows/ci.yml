name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --group dev --group cpu
      - name: Ruff
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright
      - name: Pytest
        run: uv run pytest
      - name: Shell syntax
        run: bash -n scripts/*.sh
